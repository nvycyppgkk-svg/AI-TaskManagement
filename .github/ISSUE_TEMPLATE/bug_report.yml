name: バグ報告
description: 不具合・予期しない動作の報告
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: バグ概要（1行）
      placeholder: "例: カードをドラッグ&ドロップすると元の位置に戻ってしまう"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を順番に記載してください
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      placeholder: "例: ドロップした位置にカードが移動し、その状態が保持されること"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      placeholder: "例: ドロップ後に元のリストに戻ってしまう"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      value: |
        - ブラウザ:
        - OS:
        - フロントエンドバージョン:
        - バックエンドバージョン:

  - type: textarea
    id: notes
    attributes:
      label: 補足（エラーログ・スクリーンショット等）
